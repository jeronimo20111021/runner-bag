<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RunnerBag</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            color: #cbd5f5;
        }

        .btn {
            background: #3b82f6;
            border: none;
            padding: 15px 30px;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }

        .section {
            padding: 40px 20px;
        }

        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            max-width: 300px;
        }
    </style>
</head>

<body>

<header>
    <h1>RunnerBag</h1>
    <p>Aprende a pensar como alguien que gana dinero.</p>
    <button class="btn" onclick="alert('Próximamente disponible')">Empezar</button>
</header>

<div class="section">
    <h2>¿Qué es RunnerBag?</h2>
    <p>Una plataforma para aprender a tomar decisiones inteligentes con tu dinero desde joven.</p>
</div>

<div class="section">
    <h2>Planes</h2>

    <div class="card">
        <h3>Básico</h3>
        <p>Aprende lo esencial del dinero</p>
    </div>

    <div class="card">
        <h3>Pro</h3>
        <p>Estrategias y análisis más avanzados</p>
    </div>
</div>

</body>
</html>
