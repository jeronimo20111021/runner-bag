<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunnerBag | Inteligencia Financiera</title>

    <link rel="icon" type="image/png" href="logo.png.png.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020617;
            --bg-gradient: radial-gradient(circle at top right, #1e3a8a 0%, #020617 100%);
            --accent: #2dd4bf;
            --accent-hover: #0d9488;
            --accent-glow: rgba(45, 212, 191, 0.4);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-gray: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background: var(--bg-gradient);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 50px; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%;
            top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
        }

        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-container img { height: 45px; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; }

        .menu { display: flex; gap: 10px; }
        .menu a {
            color: var(--text-gray); padding: 10px 20px; text-decoration: none;
            font-size: 14px; font-weight: 600; border-radius: 8px; transition: 0.3s;
        }
        .menu a.activo { color: var(--accent); background: rgba(45, 212, 191, 0.1); }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%; overflow: hidden; height: 40px;
            background: rgba(2, 6, 23, 0.95); border-bottom: 1px solid var(--accent);
            position: fixed; top: 70px; z-index: 99;
        }
        .ticker {
            display: inline-block; height: 40px; line-height: 40px;
            white-space: nowrap; animation: ticker 45s linear infinite;
            color: var(--accent); font-size: 13px; font-weight: 600;
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- CONTENIDO --- */
        .pantalla { display: none; min-height: 100vh; padding: 180px 20px 100px; max-width: 1100px; margin: 0 auto; }
        .pantalla.activa { display: block; animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ai-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 50px; backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); text-align: center;
        }

        .vidas-badge {
            background: rgba(45, 212, 191, 0.1); color: var(--accent);
            padding: 8px 20px; border-radius: 50px; font-size: 13px;
            font-weight: 700; border: 1px solid var(--accent); margin-bottom: 25px;
            display: inline-block; box-shadow: 0 0 15px var(--accent-glow);
        }

        input {
            width: 100%; padding: 20px 25px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            color: white; font-size: 16px; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #020617; padding: 18px 40px; border: none; border-radius: 14px;
            font-family: 'Montserrat', sans-serif; font-weight: 800; cursor: pointer;
            width: 100%; text-transform: uppercase;
        }

        .respuesta-box {
            margin-top: 35px; padding: 30px; border-radius: 18px;
            background: rgba(0, 0, 0, 0.4); text-align: left;
            border-left: 5px solid var(--accent); display: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="ir('inicio')">
            <img src="logo.png.png.png" alt="RunnerBag Logo">
            <span class="logo-text">RunnerBag</span>
        </div>
        <div class="menu">
            <a onclick="ir('inicio')" id="nav-inicio" class="activo">INICIO</a>
            <a onclick="ir('ia')" id="nav-ia">CEREBRO IA</a>
            <a onclick="ir('planes')" id="nav-planes">CURSOS</a>
            <a onclick="ir('registro')" id="nav-registro">SOPORTE</a>
        </div>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker">
            <i class="fa-solid fa-bolt"></i> RUNNERBAG ACTUALIZACIÓN: BITCOIN $98,420 (+2.1%) &nbsp;&nbsp;•&nbsp;&nbsp; S&P 500 5,450 (+0.8%)
        </div>
    </div>

    <div id="inicio" class="pantalla activa">
        <div style="text-align: center;">
            <h1>Domina el Futuro de tus <span style="color: var(--accent);">Finanzas</span></h1>
            <button class="btn" style="width: auto;" onclick="ir('ia')">INICIAR CONSULTORÍA IA</button>
        </div>
    </div>

    <div id="ia" class="pantalla">
        <div class="ai-card">
            <div class="vidas-badge" id="vidas-display"><i class="fa-solid fa-heart"></i> 5 CONSULTAS</div>
            <h2>Consultoría Inteligente</h2>
            <input type="text" id="preguntaUsuario" placeholder="Escribe tu duda financiera...">
            <button class="btn" onclick="hablarConIA()">ANALIZAR CON CEREBRO IA</button>
            <div id="respuestaContenedor" class="respuesta-box"><div id="textoRespuesta"></div></div>
        </div>
    </div>

    <div id="planes" class="pantalla"><h2>Sección de Cursos</h2></div>
    <div id="registro" class="pantalla"><h2>Soporte Técnico</h2></div>

    <script>
        // PEGA AQUÍ TU LLAVE NUEVA (LA QUE LLAMASTE RunnerBag API Key)
        const API_KEY = "AIzaSyALNgZAcPeD7zpur411nj-TGsEFbuMA2AM"; 
        let consultasRestantes = 5;

        function ir(id) {
            document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));
            document.querySelectorAll(".menu a").forEach(a => a.classList.remove("activo"));
            document.getElementById(id).classList.add("activa");
            document.getElementById("nav-" + id).classList.add("activo");
        }

        async function hablarConIA() {
            const input = document.getElementById("preguntaUsuario");
            const contenedor = document.getElementById("respuestaContenedor");
            const texto = document.getElementById("textoRespuesta");
            const vidas = document.getElementById("vidas-display");

            if (!input.value.trim()) return;
            if (consultasRestantes <= 0) return;

            contenedor.style.display = "block";
            texto.innerHTML = "Analizando datos...";

            try {
                // MODELO ACTUALIZADO A GEMINI-1.5-FLASH
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres la IA de la fintech RunnerBag. Responde: " + input.value }] }]
                    })
                });

                const data = await res.json();

                if (data.candidates) {
                    texto.innerHTML = data.candidates[0].content.parts[0].text;
                    consultasRestantes--;
                    vidas.innerHTML = `<i class="fa-solid fa-heart"></i> ${consultasRestantes} CONSULTAS`;
                } else {
                    texto.innerHTML = "Error de respuesta: " + (data.error ? data.error.message : "Desconocido");
                }
            } catch (e) {
                texto.innerHTML = "Error de conexión.";
            }
        }
    </script>
</body>
</html>
