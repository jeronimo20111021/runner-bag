<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RunnerBag - Corre en la Bolsa</title>
    <link rel="icon" href="logo.png.png.png"> <!-- Usa el nombre real del archivo -->

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
        }

        /* Barra de utilidades */
        .util-bar {
            background-color: #0f172a;
            color: #cbd5f5;
            padding: 8px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-size: 14px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 200;
        }

        /* Barra de navegación principal */
        nav {
            background-color: #1e3a8a;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 35px; /* debajo de la barra de utilidades */
            width: 100%;
            z-index: 150;
        }

        .logo-nav {
            height: 40px; /* tamaño del logo dentro del menú */
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .menu a:hover {
            color: #93c5fd;
        }

        header {
            text-align: center;
            padding: 200px 20px 100px; /* espacio extra por las barras */
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            animation: subir 1s ease-out;
        }

        p {
            color: #cbd5f5;
            font-size: 18px;
            max-width: 600px;
            margin: auto;
            animation: subir 1.5s ease-out;
        }

        .btn {
            background: #3b82f6;
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
            animation: subir 2s ease-out;
        }

        .btn:hover {
            background: #2563eb;
        }

        .section {
            padding: 60px 20px;
            text-align: center;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 12px;
            width: 280px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
            animation: subir 2s ease-out;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        footer {
            background: rgba(15,23,42,0.9);
            padding: 30px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            animation: subir 2.5s ease-out;
        }

        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<!-- Barra de utilidades -->
<div class="util-bar">
    <span>📞 Contacto: info@runnerbag.com</span>
    <span>🌙 Modo Oscuro</span>
    <span>🔍 Buscar</span>
</div>

<!-- Barra de navegación con logo -->
<nav>
    <img src="logo.png.png.png" class="logo-nav"> <!-- Aquí también el nombre real -->
    <div class="menu">
        <a href="#">
