<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RunnerBag - Corre en la Bolsa</title>
    
    <!-- Logo en la pestaña (favicon) -->
    <link rel="icon" href="logo.png.png.png">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a, #1e3a8a); /* Azul oscuro a azul intenso */
        }

        /* Barra de navegación */
        nav {
            background-color: #1e3a8a; /* Azul que contrasta */
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #93c5fd; /* Azul claro al pasar el mouse */
        }

        /* Logo esquina (sin brillo) */
        .logo-corner {
            position: absolute;
            top: 70px; /* debajo de la barra */
            left: 20px;
            width: 70px;
            animation: subir 1.2s ease-out;
        }

        header {
            text-align: center;
            padding: 160px 20px 100px; /* más espacio por la barra */
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            animation: subir 1s ease-out;
        }

        p {
            color: #cbd5f5;
            font-size: 18px;
            max-width: 600px;
            margin: auto;
            animation: subir 1.5s ease-out;
        }

        .btn {
            background: #3b82f6;
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
            animation: subir 2s ease-out;
        }

        .btn:hover {
            background: #2563eb;
        }

        .section {
            padding: 60px 20px;
            text-align: center;
        }

        .section h2 {
            animation: subir 1.2s ease-out;
        }

        .section p {
            animation: subir 1.5s ease-out;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 12px;
            width: 280px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
            animation: subir 2s ease-out;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        footer {
            background: rgba(15,23,42,0.9);
            padding: 30px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            animation: subir 2.5s ease-out;
        }

        /* Animación de subida */
        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- Barra de navegación -->
<nav>
    <a href="#">Home</a>
    <a href="#">IA de Inversión</a>
    <a href="#">
