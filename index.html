<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunnerBag | Inteligencia Financiera</title>

    <link rel="icon" type="image/png" href="logo.png.png.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020617;
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.4);
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%);
            min-height: 100vh;
        }

        .ticker-wrap {
            width: 100%; overflow: hidden; height: 35px;
            background-color: rgba(2, 6, 23, 0.9);
            border-bottom: 1px solid var(--accent);
            position: fixed; top: 60px; z-index: 99;
        }

        .ticker {
            display: inline-block; height: 35px; line-height: 35px;
            white-space: nowrap; padding-right: 100%;
            animation: ticker 40s linear infinite;
            color: var(--accent); font-size: 12px; font-weight: bold;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        nav {
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px);
            padding: 10px 40px; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%;
            top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-container img { height: 40px; }

        .menu a {
            color: var(--text-gray); padding: 10px 15px;
            text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer;
        }

        .pantalla {
            display: none; min-height: 100vh; padding: 160px 20px 80px;
            max-width: 1000px; margin: 0 auto; box-sizing: border-box;
        }

        .pantalla.activa { display: block; }

        .ai-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px; text-align: center;
        }

        .vidas-badge {
            background: rgba(45, 212, 191, 0.1); color: var(--accent);
            padding: 6px 15px; border-radius: 50px; font-size: 12px;
            font-weight: bold; border: 1px solid var(--accent);
            margin-bottom: 20px; display: inline-block;
        }

        input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: white; margin-bottom: 15px; outline: none;
        }

        .btn {
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            color: #020617; padding: 15px 30px; border: none;
            border-radius: 12px; font-weight: 800; cursor: pointer;
            width: 100%; text-transform: uppercase;
        }

        .respuesta-box {
            margin-top: 30px; padding: 25px; border-radius: 15px;
            background: rgba(0, 0, 0, 0.3); text-align: left;
            border-left: 4px solid var(--accent); display: none;
        }

        footer {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 40px; text-align: center; color: var(--text-gray);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="ir('inicio')">
            <img src="logo.png.png.png" alt="Logo">
            <b style="font-size: 20px;">RunnerBag</b>
        </div>
        <div class="menu">
            <a onclick="ir('inicio')">INICIO</a>
            <a onclick="ir('ia')">GUÍA IA</a>
            <a onclick="ir('planes')">CURSOS</a>
            <a onclick="ir('registro')">SOPORTE</a>
        </div>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker">
            BITCOIN $98,420 (+2.1%) • NVIDIA $168.20 (+3.8%) • GOLD $2,420 (-0.1%)
        </div>
    </div>

    <div id="inicio" class="pantalla activa">
        <div style="text-align: center;">
            <h1 style="font-size: 50px;">RunnerBag Fintech</h1>
            <button class="btn" style="width: auto;" onclick="ir('ia')">Hablar con la IA</button>
        </div>
    </div>

    <div id="ia" class="pantalla">
        <div class="ai-card">
            <div class="vidas-badge" id="vidas-display">5 VIDAS DISPONIBLES</div>
            <h2>Cerebro RunnerBag</h2>
            <input type="text" id="preguntaUsuario" placeholder="Escribe tu mensaje aquí...">
            <button class="btn" onclick="hablarConIA()">ANALIZAR CON GEMINI PRO</button>
            <div id="respuestaContenedor" class="respuesta-box">
                <div id="textoRespuesta"></div>
            </div>
        </div>
    </div>

    <div id="planes" class="pantalla">
        <h2 style="text-align: center;">Planes</h2>
        <div class="ai-card"><h3>Plan Gratuito Activo</h3></div>
    </div>

    <div id="registro" class="pantalla">
        <div class="ai-card">
            <h2>Soporte</h2>
            <form action="https://formspree.io/f/mgorgnko" method="POST">
                <input type="email" name="email" placeholder="Tu Email" required>
                <button type="submit" class="btn">Enviar</button>
            </form>
        </div>
    </div>

    <footer><p>RunnerBag 2026</p></footer>

    <script>
        // CONFIGURACIÓN DE LLAVE - USA V1BETA CON GEMINI-PRO
        const API_KEY = "AIzaSyDWzqfM9HZ8CaZtLGTep-bsuHK48OvZylA"; 
        let vidas = 5;

        function ir(p) {
            document.querySelectorAll(".pantalla").forEach(x => x.classList.remove("activa"));
            document.getElementById(p).classList.add("activa");
        }

        async function hablarConIA() {
            const pregunta = document.getElementById("preguntaUsuario").value;
            const contenedor = document.getElementById("respuestaContenedor");
            const texto = document.getElementById("textoRespuesta");
            const displayVidas = document.getElementById("vidas-display");

            if (!pregunta || vidas <= 0) return;

            contenedor.style.display = "block";
            texto.innerHTML = "Conectando al canal Beta...";

            try {
                // RUTA BETA CON MODELO PRO PARA MÁXIMA COMPATIBILIDAD GRATUITA
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Responde como el guía de RunnerBag: " + pregunta }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    const respuesta = data.candidates[0].content.parts[0].text;
                    vidas--;
                    displayVidas.innerText = vidas + " VIDAS DISPONIBLES";
                    texto.innerHTML = respuesta.replace(/\n/g, '<br>');
                } else {
                    texto.innerHTML = "Error de respuesta: " + (data.error ? data.error.message : "Modelo no disponible en esta región.");
                }
            } catch (e) {
                texto.innerHTML = "Fallo de conexión. Revisa que tu API Key sea de Google AI Studio.";
            }
        }
    </script>
</body>
</html>
