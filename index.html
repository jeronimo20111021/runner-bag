<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RunnerBag</title>

    <!-- Icono en la pestaña -->
<link rel="icon" href="logo.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
        }

        /* LOGO ESQUINA */
        .logo-corner {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
        }

        header {
            padding: 100px 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            animation: subir 1s ease-out;
        }

        p {
            color: #cbd5f5;
            animation: subir 1.5s ease-out;
        }

        .btn {
            background: #3b82f6;
            border: none;
            padding: 15px 30px;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            animation: subir 2s ease-out;
        }

        .section {
            padding: 40px 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        /* ANIMACIÓN */
        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- LOGO ARRIBA IZQUIERDA -->
<img src="logo.png" class="logo-corner">

<header>
    <h1>RunnerBag</h1>
    <p>Aprende a pensar como alguien que gana dinero.</p>
    <button class="btn" onclick="alert('Próximamente disponible')">
        Empezar
    </button>
</header>

<div class="section">
    <h2>¿Qué es RunnerBag?</h2>
    <p>Una plataforma para aprender a tomar decisiones inteligentes con tu dinero desde joven.</p>
</div>

<div class="section">
    <h2>Planes</h2>

    <div class="card">
        <h3>Básico</h3>
        <p>Aprende lo esencial del dinero</p>
    </div>

    <div class="card">
        <h3>Pro</h3>
        <p>Estrategias y análisis más avanzados</p>
    </div>
</div>

</body>
</html>
